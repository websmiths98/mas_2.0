<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blend Test</title>
<style>
  body { background: #eee; padding: 50px; font-family: sans-serif; }
  .card {
    width: 200px; height: 100px;
    background-color: #E31837; /* Red */
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card img {
    max-width: 80%; max-height: 80%;
    object-fit: contain;
    filter: grayscale(1) invert(1) contrast(100);
    mix-blend-mode: screen;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="public/logo_mas/addidas_logo.jpg" alt="Logo">
  </div>
</body>
</html>
